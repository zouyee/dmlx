name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install mlx-c
        run: |
          brew install mlx-c
          ls -la /opt/homebrew/lib/libmlxc.dylib || ls -la /usr/local/lib/libmlxc.dylib
          pkg-config --exists mlxc && echo "mlx-c found via pkg-config" || echo "WARNING: pkg-config mlxc not found"

      - name: Build
        run: |
          export LIBRARY_PATH="/opt/homebrew/lib:/usr/local/lib:$LIBRARY_PATH"
          export CPATH="/opt/homebrew/include:/usr/local/include:$CPATH"
          zig build -Doptimize=ReleaseFast

      - name: Run unit tests
        run: zig build test

      - name: Check formatting
        run: zig fmt --check src/
