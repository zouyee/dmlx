name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache Zig dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install mlx-c
        run: |
          brew install mlxc || true
          pkg-config --exists mlxc || echo "mlx-c not found via pkg-config"

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Run unit tests
        run: zig build test

      - name: Check formatting
        run: zig fmt --check src/
