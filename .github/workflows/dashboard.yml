name: Deploy Performance Dashboard

on:
  push:
    branches: [benchmark-results]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout benchmark-results branch
        uses: actions/checkout@v4
        with:
          ref: benchmark-results
          path: benchmark-data

      - name: Checkout main branch (for scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install plotly pandas

      - name: Generate dashboard
        run: |
          mkdir -p _site
          python source/scripts/generate_dashboard.py \
            --data-dir benchmark-data \
            --output-dir _site
          echo "dmlx.ai" > _site/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-dashboard
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
